<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Employee Income System</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #18bc9c;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        /* Form Styling */
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            background: #f1f4f6;
            padding: 20px;
            border-radius: 6px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            grid-column: 1 / -1;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #128f76;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .total-row {
            font-weight: bold;
            background-color: #eaedd0 !important;
            border-top: 2px solid var(--primary-color);
        }

        .grand-total-box {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Hospital Employee Management & Income System</h2>
    
    <div class="form-group">
        <div class="input-field">
            <label for="empId">ID</label>
            <input type="text" id="empId" placeholder="e.g. E001">
        </div>
        <div class="input-field">
            <label for="empName">Name</label>
            <input type="text" id="empName" placeholder="e.g. Dr. Smith">
        </div>
        <div class="input-field">
            <label for="empAge">Age</label>
            <input type="number" id="empAge" placeholder="e.g. 35">
        </div>
        <div class="input-field">
            <label for="firstMonth">First Month Income ($)</label>
            <input type="number" id="firstMonth" placeholder="0.00">
        </div>
        <div class="input-field">
            <label for="lastMonth">Last Month Income ($)</label>
            <input type="number" id="lastMonth" placeholder="0.00">
        </div>
        <button onclick="addEmployee()">Add Employee</button>
    </div>

    <table id="employeeTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>First Month Income</th>
                <th>Last Month Income</th>
            </tr>
        </thead>
        <tbody id="employeeBody">
            <tr>
                <td>E001</td>
                <td>Dr. Alice Smith</td>
                <td>42</td>
                <td>$8,500.00</td>
                <td>$9,200.00</td>
            </tr>
            <tr>
                <td>E002</td>
                <td>Nurse Bob Jones</td>
                <td>29</td>
                <td>$4,100.00</td>
                <td>$4,150.00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3">Totals</td>
                <td id="totalFirstMonth">$12,600.00</td>
                <td id="totalLastMonth">$13,350.00</td>
            </tr>
        </tfoot>
    </table>

    <div class="grand-total-box" id="grandTotal">
        Combined Grand Total: $25,950.00
    </div>
</div>

<script>
    // In-memory array initialized with the sample data shown in HTML
    let employees = [
        { id: "E001", name: "Dr. Alice Smith", age: 42, firstMonth: 8500, lastMonth: 9200 },
        { id: "E002", name: "Nurse Bob Jones", age: 29, firstMonth: 4100, lastMonth: 4150 }
    ];

    function addEmployee() {
        // Get input values
        const id = document.getElementById('empId').value.trim();
        const name = document.getElementById('empName').value.trim();
        const age = document.getElementById('empAge').value.trim();
        const firstMonth = parseFloat(document.getElementById('firstMonth').value);
        const lastMonth = parseFloat(document.getElementById('lastMonth').value);

        // Simple validation
        if (!id || !name || !age || isNaN(firstMonth) || isNaN(lastMonth)) {
            alert("Please fill in all fields with valid data.");
            return;
        }

        // Add to array
        employees.push({ id, name, age, firstMonth, lastMonth });

        // Refresh UI
        updateTable();

        // Clear input fields
        document.getElementById('empId').value = '';
        document.getElementById('empName').value = '';
        document.getElementById('empAge').value = '';
        document.getElementById('firstMonth').value = '';
        document.getElementById('lastMonth').value = '';
    }

    function updateTable() {
        const tbody = document.getElementById('employeeBody');
        tbody.innerHTML = ''; // Clear existing rows

        let totalFirst = 0;
        let totalLast = 0;

        // Populate rows and calculate totals
        employees.forEach(emp => {
            totalFirst += emp.firstMonth;
            totalLast += emp.lastMonth;

            const row = `<tr>
                <td>${emp.id}</td>
                <td>${emp.name}</td>
                <td>${emp.age}</td>
                <td>$${emp.firstMonth.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                <td>$${emp.lastMonth.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // Update total row and grand total box
        document.getElementById('totalFirstMonth').innerText = `$${totalFirst.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('totalLastMonth').innerText = `$${totalLast.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        
        const grandTotal = totalFirst + totalLast;
        document.getElementById('grandTotal').innerText = `Combined Grand Total: $${grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }
</script>

</body>
</html>
